# Prospector Scanner Configuration
CONFIG_PROSPECTOR_MODE_SCANNER=y

# Display configuration
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_LVGL=y

# PWM for backlight
CONFIG_PWM=y

# SPI for display communication
CONFIG_SPI=y

# Enable GPIO
CONFIG_GPIO=y

# BLE Scanner configuration
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_MAX_CONN=0

# Logging for debugging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ZMK specific
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_BLE=y

# Disable unused features to save space
CONFIG_ZMK_USB=n