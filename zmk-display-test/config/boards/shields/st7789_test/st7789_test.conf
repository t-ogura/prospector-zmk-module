# ST7789 Color Display Test Configuration

# Enable USB
CONFIG_ZMK_USB=y

# Enable display support
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y

# Display driver
CONFIG_ST7789V=y
CONFIG_SPI=y

# Enable PWM for backlight
CONFIG_PWM=y

# LVGL graphics library
CONFIG_LVGL=y
CONFIG_LV_USE_THEME_MONO=n        # Disable mono theme
CONFIG_LV_USE_THEME_DEFAULT=y     # Enable color theme
CONFIG_LV_COLOR_DEPTH_16=y        # 16-bit color (RGB565)
CONFIG_LV_COLOR_16_SWAP=y         # Swap bytes for RGB565

# Enable more fonts for better display
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_26=y

# Display work queue
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Enable widgets
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# Battery reporting for display
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BLE=y

# Disable split keyboard features
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_SPLIT_BLE=n

# Debug options
CONFIG_ZMK_USB_LOGGING=y