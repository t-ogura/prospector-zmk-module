# Simple LED test configuration for XIAO BLE
# Testing basic GPIO control without any custom modules

# Basic ZMK settings
CONFIG_ZMK_USB=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y

# Enable GPIO for LED control
CONFIG_GPIO=y

# Enable Bluetooth for LED status indication  
CONFIG_BT=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Enable RGB LED Widget
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_SELF=y

# Disable features that might cause syscall issues
CONFIG_USERSPACE=n

# Enable console for debugging  
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n

# Enable basic display functionality
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_PWM=y

# Display driver settings
CONFIG_ST7789V=y
CONFIG_SPI=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_LVGL=y
CONFIG_LV_USE_THEME_MONO=y