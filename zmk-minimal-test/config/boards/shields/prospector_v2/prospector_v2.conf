# Prospector V2 Configuration - Phase 1 (Labels Only)
# Based on working display_test configuration

# USB Logging
CONFIG_LOG=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

# Fault/crash debugging
CONFIG_FAULT_DUMP=2
CONFIG_EXTRA_EXCEPTION_INFO=y

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_LVGL=y

# Use custom status screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# LVGL memory pool - increased for stability
CONFIG_LV_Z_MEM_POOL_SIZE=32768

# Display thread stack - increased for LVGL 9
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# Main thread stack - also increase
CONFIG_MAIN_STACK_SIZE=4096

# Font settings
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_22=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_FONT_UNSCII_8=y
CONFIG_LV_FONT_UNSCII_16=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_20=y
CONFIG_LV_USE_LABEL=y

# Display/SPI debug logging
CONFIG_DISPLAY_LOG_LEVEL_DBG=y
CONFIG_SPI_LOG_LEVEL_DBG=n

# LVGL internal logging
CONFIG_LV_USE_LOG=y
CONFIG_LV_LOG_LEVEL_INFO=y

# Disable BLE for Phase 1 (simplicity)
CONFIG_ZMK_BLE=n
CONFIG_BT=n

# GPIO for backlight
CONFIG_GPIO=y
