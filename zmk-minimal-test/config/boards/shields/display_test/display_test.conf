# Display Test Configuration

# USB Logging - reduced noise
CONFIG_LOG=y
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_WRN=y

# Fault/crash debugging
CONFIG_FAULT_DUMP=2
CONFIG_EXTRA_EXCEPTION_INFO=y

# Display - RE-ENABLED for testing
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_LVGL=y

# Use custom status screen
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Dedicated display work queue - needed for stack size setting
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# LVGL memory pool - increased for debugging
CONFIG_LV_Z_MEM_POOL_SIZE=32768

# Display thread stack - increased for LVGL 9 deeper recursion
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192

# Main thread stack - also increase
CONFIG_MAIN_STACK_SIZE=4096

# Font settings (match Prospector)
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_22=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_FONT_UNSCII_8=y
CONFIG_LV_FONT_UNSCII_16=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_20=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y

# Layout engines - REQUIRED for container + child objects in LVGL 9
CONFIG_LV_USE_FLEX=y

# Display/SPI logging - reduced
CONFIG_DISPLAY_LOG_LEVEL_WRN=y
CONFIG_SPI_LOG_LEVEL_WRN=y
CONFIG_MIPI_DBI_LOG_LEVEL_WRN=y

# LVGL internal logging - reduced
CONFIG_LV_USE_LOG=y
CONFIG_LV_LOG_LEVEL_WARN=y

# Enable BLE for scanner functionality
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_OBSERVER=y

# Reduce BLE log noise
CONFIG_BT_LOG_LEVEL_WRN=y

# GPIO for backlight
CONFIG_GPIO=y

# ===== Prospector Scanner Mode =====
CONFIG_PROSPECTOR_MODE_SCANNER=y
CONFIG_PROSPECTOR_MULTI_KEYBOARD=y
CONFIG_PROSPECTOR_MAX_KEYBOARDS=3
CONFIG_PROSPECTOR_MAX_LAYERS=7

# Enable touch (CST816S driver test)
# Direct Kconfig options (not using Prospector module Kconfig)
CONFIG_I2C=y
CONFIG_INPUT=y
CONFIG_INPUT_CST816S=y
CONFIG_INPUT_CST816S_INTERRUPT=y

# Touch/I2C/Sensor logging - reduced
CONFIG_I2C_LOG_LEVEL_WRN=y
CONFIG_INPUT_LOG_LEVEL_WRN=y
CONFIG_SENSOR_LOG_LEVEL_INF=y

# ===== Light Sensor (APDS9960) =====
CONFIG_SENSOR=y
CONFIG_APDS9960=y
CONFIG_APDS9960_TRIGGER_NONE=y

# Scanner settings
CONFIG_PROSPECTOR_SCANNER_TIMEOUT_MS=300000
CONFIG_PROSPECTOR_SCANNER_MAIN_LOOP_INTERVAL_MS=120

# LVGL OSAL disabled - causes work queue blocking
# CONFIG_DYNAMIC_THREAD=y
# CONFIG_LV_Z_USE_OSAL=y
